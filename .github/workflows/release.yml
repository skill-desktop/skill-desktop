name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel
          - platform: macos-13
            target: x86_64-apple-darwin
            name: macos-intel
          # macOS ARM (Apple Silicon)
          - platform: macos-14
            target: aarch64-apple-darwin
            name: macos-arm
          # Windows Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-intel
          # Windows ARM
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            name: windows-arm
          # Linux Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-intel

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Windows ARM setup
      - name: Setup Windows ARM target
        if: matrix.platform == 'windows-latest' && matrix.target == 'aarch64-pc-windows-msvc'
        run: |
          rustup target add aarch64-pc-windows-msvc

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
            ~/AppData/Local/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Skill Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## What's Changed
            
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
            
            ## Downloads
            
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Intel (x64) | `.dmg` |
            | macOS | Apple Silicon (ARM64) | `.dmg` |
            | Windows | Intel (x64) | `.msi` / `.exe` |
            | Windows | ARM64 | `.msi` / `.exe` |
            | Linux | Intel (x64) | `.deb` / `.AppImage` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # Create a combined release after all builds complete
  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
